<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مولّد الاختبارات التربوية – المنهاج الجزائري</title>
  <style>
    /* ─── CSS Variables ─── */
    :root {
      --primary: #0b3b5c;
      --primary-light: #1e5a7d;
      --accent: #2a9d8f;
      --accent-light: #e9f2f0;
      --bg: #f5f7fa;
      --card: #ffffff;
      --text: #1e2b3c;
      --text-muted: #4a6572;
      --border: #d9e2ec;
      --shadow: 0 12px 30px rgba(0,0,0,0.08);
      --radius: 24px;
      --radius-sm: 14px;
      --a4-width: 210mm;
      --a4-padding: 20mm;
    }

    /* ─── Reset & Base ─── */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      padding: 20px;
      color: var(--text);
      font-family: 'Segoe UI', Tahoma, 'Noto Sans Arabic', sans-serif;
      line-height: 1.6;
    }

    /* ─── Container ─── */
    .container {
      max-width: 1000px;
      margin: 0 auto;
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px 32px;
      position: relative;
    }

    /* ─── Header ─── */
    .developer-signature {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      font-size: 0.9rem;
      color: var(--text-muted);
      border-bottom: 1px dashed #cbd5e1;
      padding-bottom: 10px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .signature-name {
      background: var(--accent-light);
      padding: 6px 16px;
      border-radius: 40px;
      font-weight: 600;
      color: var(--primary);
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 600;
      color: var(--primary);
      margin-bottom: 10px;
      border-right: 6px solid var(--accent);
      padding-right: 20px;
    }
    .subtitle {
      color: var(--text-muted);
      margin-bottom: 30px;
      font-size: 1.0rem;
    }

    /* ─── Alert Box ─── */
    .alert-box {
      background: #fff3cd;
      border: 1px solid #ffc107;
      color: #856404;
      padding: 12px 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      font-size: 0.95rem;
      text-align: center;
    }

    /* ─── Form Grid ─── */
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 18px 24px;
      background: #fafbfc;
      padding: 24px;
      border-radius: 20px;
      margin-bottom: 30px;
    }
    .field-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .field-group.full-width { grid-column: 1 / -1; }

    label {
      font-weight: 600;
      font-size: 0.9rem;
      color: #1e3a5f;
    }
    .required::after {
      content: " *";
      color: #e74c3c;
    }

    input, select, textarea {
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 0.95rem;
      background: white;
      transition: 0.2s;
      resize: vertical;
      color: var(--text);
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
      outline: none;
      box-shadow: 0 0 0 3px rgba(42,157,143,0.15);
    }
    input[readonly] {
      background: #f0f4f8;
      cursor: not-allowed;
    }

    .btn-green {
      background: var(--primary);
      color: white;
      border: none;
      padding: 16px 28px;
      font-size: 1.2rem;
      font-weight: bold;
      border-radius: 48px;
      cursor: pointer;
      box-shadow: 0 6px 14px rgba(11,59,92,0.25);
      transition: all 0.2s;
      width: 100%;
      max-width: 300px;
      margin: 10px 0 20px;
    }
    .btn-green:hover {
      background: var(--primary-light);
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(11,59,92,0.3);
    }
    .btn-green:disabled {
      background: #b0c4d9;
      box-shadow: none;
      transform: none;
      cursor: not-allowed;
    }

    /* ─── Status ─── */
    .status-area {
      display: flex;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
      margin: 20px 0 10px;
    }
    #status {
      background: #eef3f7;
      padding: 8px 20px;
      border-radius: 40px;
      color: var(--primary);
      font-weight: 500;
      font-size: 0.95rem;
    }

    /* ─── Output Card ─── */
    .output-card {
      background: var(--card);
      border: 1px solid #e2e9f0;
      border-radius: var(--radius);
      padding: 20px 0;
      margin: 20px 0 0;
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.02);
      line-height: 1.8;
      overflow-x: auto;
    }
    .a4-paper {
      width: 210mm;
      min-height: 297mm;
      background: white;
      margin: 0 auto;
      padding: 20mm;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      border: 1px solid #e2e8f0;
      position: relative;
      overflow: hidden;
    }
    .a4-paper .paper-content {
      font-size: 14pt;
      line-height: 1.8;
      color: #1a1a1a;
    }
    .a4-paper.editable {
      border: 2px dashed var(--accent);
      background: #fafefe;
    }
    .a4-paper.editable .paper-content {
      outline: none;
      min-height: 250mm;
    }
    .edit-hint {
      display: none;
      background: var(--accent);
      color: white;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 0.85rem;
      text-align: center;
      margin-bottom: 10px;
    }
    .a4-paper.editable .edit-hint {
      display: block;
    }

    .meta {
      background: var(--accent-light);
      padding: 12px 18px;
      border-radius: 30px;
      color: var(--primary);
      margin-bottom: 24px;
      display: inline-block;
    }
    .q { margin: 20px 0; }
    .n { font-weight: 700; color: var(--primary-light); }
    .t { margin-top: 8px; }

    .error-details {
      background: #ffeaea;
      padding: 12px;
      border-radius: 12px;
      margin-top: 10px;
      color: #b11;
      font-size: 0.85rem;
      direction: ltr;
      text-align: left;
    }

    .validation-error {
      background: #fff3cd;
      border: 1px solid #ffc107;
      color: #856404;
      padding: 12px 16px;
      border-radius: 12px;
      margin-bottom: 16px;
      font-size: 0.9rem;
    }

    footer {
      text-align: center;
      margin-top: 30px;
      color: #7a8f9f;
      font-size: 0.85rem;
    }

    .fraction {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      vertical-align: middle;
      margin: 0 4px;
      font-size: 0.9em;
    }
    .fraction .num {
      border-bottom: 2px solid var(--text);
      padding: 0 4px;
      text-align: center;
    }
    .fraction .den {
      padding: 0 4px;
      text-align: center;
    }

    .download-area {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin: 20px 0;
      flex-wrap: wrap;
    }
    .btn-download {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      text-decoration: none;
    }
    .btn-word {
      background: #2b579a;
      color: white;
      box-shadow: 0 4px 12px rgba(43,87,154,0.3);
    }
    .btn-word:hover {
      background: #1e3f6f;
      transform: translateY(-2px);
    }
    .btn-pdf {
      background: #c0392b;
      color: white;
      box-shadow: 0 4px 12px rgba(192,57,43,0.3);
    }
    .btn-pdf:hover {
      background: #a93226;
      transform: translateY(-2px);
    }
    .btn-toggle-edit {
      background: var(--accent);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-toggle-edit:hover {
      background: #21867a;
      transform: translateY(-2px);
    }
    .strong-sep {
      border: none;
      height: 3px;
      background: linear-gradient(to right, transparent, var(--primary), transparent);
      margin: 24px 0;
    }
    .page-break {
      page-break-before: always;
      break-before: page;
      border: none;
      height: 2px;
      background: linear-gradient(to right, transparent, var(--accent), transparent);
      margin: 30px 0;
    }

    @media print {
      body { background: white; padding: 0; }
      .container { max-width: 100%; border-radius: 0; box-shadow: none; padding: 0; }
      .output-card { border: none; box-shadow: none; padding: 0; overflow: visible; }
      .a4-paper {
        width: 100%;
        border: none;
        box-shadow: none;
        padding: 15mm;
        margin: 0;
      }
      .font-size-bar, .download-area, .edit-hint,
      .developer-signature, .form-grid, .btn-green, .status-area {
        display: none !important;
      }
    }

    @media (max-width: 900px) {
      .a4-paper {
        width: 100%;
        padding: 15px;
      }
    }
    @media (max-width: 600px) {
      .container { padding: 16px; }
      h1 { font-size: 1.6rem; }
      .form-grid { grid-template-columns: 1fr; padding: 16px; }
      .developer-signature { flex-direction: column; align-items: flex-start; }
      .download-area { flex-direction: column; align-items: center; }
    }
  </style>
</head>
