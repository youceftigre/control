<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مولّد الاختبارات التربوية – المنهاج الجزائري</title>
    <style>
        /* ─── CSS Variables ─── */
        :root {
            --primary: #0b3b5c;
            --primary-light: #1e5a7d;
            --accent: #2a9d8f;
            --accent-light: #e9f2f0;
            --bg: #f5f7fa;
            --card: #ffffff;
            --text: #1e2b3c;
            --text-muted: #4a6572;
            --border: #d9e2ec;
            --shadow: 0 12px 30px rgba(0,0,0,0.08);
            --radius: 24px;
            --radius-sm: 14px;
            --a4-width: 210mm;
            --a4-padding: 20mm;
        }

        /* ─── Reset & Base ─── */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            padding: 20px;
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, 'Noto Sans Arabic', sans-serif;
            line-height: 1.6;
        }

        /* ─── Container ─── */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 28px 32px;
            position: relative;
        }

        /* ─── Header ─── */
        .developer-signature {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 0.9rem;
            color: var(--text-muted);
            border-bottom: 1px dashed #cbd5e1;
            padding-bottom: 10px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .signature-name {
            background: var(--accent-light);
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: 600;
            color: var(--primary);
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 10px;
            border-right: 6px solid var(--accent);
            padding-right: 20px;
        }
        .subtitle {
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 1rem;
        }

        /* ─── Form Grid ─── */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 18px 24px;
            background: #fafbfc;
            padding: 24px;
            border-radius: 20px;
            margin-bottom: 30px;
        }
        .field-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .field-group.full-width { grid-column: 1 / -1; }

        label {
            font-weight: 600;
            font-size: 0.9rem;
            color: #1e3a5f;
        }

        input, select, textarea {
            padding: 12px 14px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 0.95rem;
            background: white;
            transition: 0.2s;
            resize: vertical;
            color: var(--text);
        }
        input:focus, select:focus, textarea:focus {
            border-color: var(--accent);
            outline: none;
            box-shadow: 0 0 0 3px rgba(42,157,143,0.15);
        }

        /* ─── Button ─── */
        .btn-green {
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px 28px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 48px;
            cursor: pointer;
            box-shadow: 0 6px 14px rgba(11,59,92,0.25);
            transition: all 0.2s;
            width: 100%;
            max-width: 300px;
            margin: 10px 0 20px;
        }
        .btn-green:hover {
            background: var(--primary-light);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(11,59,92,0.3);
        }
        .btn-green:disabled {
            background: #b0c4d9;
            box-shadow: none;
            transform: none;
            cursor: not-allowed;
        }

        /* ─── Status ─── */
        .status-area {
            display: flex;
            align-items: center;
            gap: 18px;
            flex-wrap: wrap;
            margin: 20px 0 10px;
        }
        #status {
            background: #eef3f7;
            padding: 8px 20px;
            border-radius: 40px;
            color: var(--primary);
            font-weight: 500;
            font-size: 0.95rem;
        }

        /* ─── A4 Paper ─── */
        .a4-paper {
            width: var(--a4-width);
            min-height: 297mm;
            background: white;
            margin: 0 auto;
            padding: var(--a4-padding);
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            border: 1px solid #e2e8f0;
            position: relative;
            overflow: hidden;
        }
        .a4-paper .paper-content {
            font-size: 14pt;
            line-height: 1.8;
            color: #1a1a1a;
        }
        .a4-paper.editable {
            border: 2px dashed var(--accent);
            background: #fafefe;
        }
        .a4-paper.editable .paper-content {
            outline: none;
            min-height: 250mm;
        }
        .edit-hint {
            display: none;
            background: var(--accent);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            text-align: center;
            margin-bottom: 10px;
        }
        .a4-paper.editable .edit-hint {
            display: block;
        }

        /* ─── Output Card ─── */
        .output-card {
            background: var(--card);
            border: 1px solid #e2e9f0;
            border-radius: var(--radius);
            padding: 20px;
            margin-top: 20px;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.02);
            line-height: 1.8;
            overflow-x: auto;
        }
        #output { white-space: normal; word-wrap: break-word; }

        /* ─── Fraction Styling ─── */
        .fraction {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            vertical-align: middle;
            margin: 0 4px;
            font-size: 0.9em;
        }
        .fraction .num {
            border-bottom: 2px solid #000;
            padding: 0 4px;
            text-align: center;
        }
        .fraction .den {
            padding: 0 4px;
            text-align: center;
        }

        /* ─── Strong Separator ─── */
        .strong-sep {
            border: none;
            height: 3px;
            background: linear-gradient(to right, transparent, var(--primary), transparent);
            margin: 24px 0;
        }
        .page-break {
            page-break-before: always;
            break-before: page;
            border: none;
            height: 2px;
            background: linear-gradient(to right, transparent, var(--accent), transparent);
            margin: 30px 0;
        }

        /* ─── Action Buttons ─── */
        .btn-toggle-edit {
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid var(--border);
            cursor: pointer;
            background: white;
        }

        .font-size-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #f0f4f8;
            padding: 12px 20px;
            border-radius: 40px;
            margin: 16px 0;
            justify-content: center;
        }

        .download-area {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 20px 0;
        }

        .btn-download {
            padding: 12px 24px;
            border-radius: 40px;
            cursor: pointer;
            border: none;
            font-weight: 600;
            color: white;
        }
        .btn-word { background: #2b579a; }
        .btn-pdf { background: #c0392b; }

        @media print {
            .form-grid, .btn-green, .developer-signature, .status-area, .font-size-bar, .download-area, .edit-hint, #btnToggleEdit {
                display: none !important;
            }
            body { padding: 0; background: white; }
            .container { box-shadow: none; padding: 0; max-width: 100%; }
            .a4-paper { box-shadow: none; border: none; padding: 15mm; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="developer-signature">
        <span>⚙️ تطوير: <span class="signature-name">youcef.b</span></span>
        <span>📧 youcefbenhamidaa@gmail.com</span>
    </div>

    <h1>📋 مولّد الاختبارات التربوية</h1>
    <p class="subtitle">مولّد اختبارات مخصص للمنهاج الجزائري باستخدام الذكاء الاصطناعي</p>

    <div class="form-grid">
        <div class="field-group">
            <label for="subject">📚 المادة</label>
            <select id="subject">
                <option value="الرياضيات" selected>الرياضيات</option>
                <option value="اللغة العربية">اللغة العربية</option>
                <option value="العلوم الفيزيائية">العلوم الفيزيائية</option>
                <option value="علوم الطبيعة والحياة">علوم الطبيعة والحياة</option>
                <option value="التاريخ والجغرافيا">التاريخ والجغرافيا</option>
                <option value="التربية الإسلامية">التربية الإسلامية</option>
            </select>
        </div>

        <div class="field-group">
            <label for="grade">🎓 المستوى الدراسي</label>
            <select id="grade">
                <option value="الأولى متوسط">الأولى متوسط</option>
                <option value="الثانية متوسط">الثانية متوسط</option>
                <option value="الثالثة متوسط" selected>الثالثة متوسط</option>
                <option value="الرابعة متوسط">الرابعة متوسط</option>
            </select>
        </div>

        <div class="field-group">
            <label for="examType">📝 نوع التقييم</label>
            <select id="examType">
                <option value="اختبار">اختبار</option>
                <option value="فرض">فرض</option>
            </select>
        </div>

        <div class="field-group">
            <label for="schoolYear">📅 السنة الدراسية</label>
            <input type="text" id="schoolYear" value="2025-2026">
        </div>

        <div class="field-group">
            <label for="duration">⏱️ المدة</label>
            <input type="text" id="duration" value="ساعتان">
        </div>

        <div class="field-group">
            <label for="mark">💯 العلامة الكاملة</label>
            <input type="text" id="mark" value="20">
        </div>

        <div class="field-group full-width">
            <label for="topic">🔖 الموضوع / المحور</label>
            <input type="text" id="topic" placeholder="اتركه فارغاً إن لم يكن محدداً">
        </div>

        <div class="field-group full-width">
            <label for="extra">📌 تعليمات إضافية (اختياري)</label>
            <textarea id="extra" rows="2"></textarea>
        </div>
    </div>

    <div style="display: flex; justify-content: center;">
        <button class="btn-green" id="generateBtn">✨ توليد الاختبار بالذكاء الاصطناعي</button>
    </div>

    <div class="status-area">
        <span id="status">⏳ جاهز</span>
    </div>

    <div id="actionButtonsArea" style="display: none; margin: 20px 0;">
        <div style="display: flex; gap: 12px; justify-content: center; margin-bottom: 16px;">
            <button class="btn-toggle-edit" id="btnToggleEdit" onclick="toggleEditMode()">✏️ تعديل مباشر</button>
        </div>
        <div class="font-size-bar">
            <label>🔤 حجم الخط:</label>
            <input type="range" id="fontSizeSlider" min="10" max="24" value="14" step="1" oninput="changeFontSize(this.value)">
            <span class="font-size-value" id="fontSizeValue">14pt</span>
        </div>
        <div class="download-area">
            <button class="btn-download btn-word" onclick="downloadWord()">📄 تحميل Word</button>
            <button class="btn-download btn-pdf" onclick="downloadPDF()">📕 تحميل PDF</button>
        </div>
    </div>

    <div class="output-card">
        <div class="a4-paper" id="a4Paper">
            <div class="edit-hint">✏️ وضع التعديل مفعل – يمكنك النقر على النص والتعديل مباشرة</div>
            <div class="paper-content" id="output">
                <p style="text-align:center; color:#999;">سيظهر الاختبار هنا...</p>
            </div>
        </div>
    </div>

    <footer>© 2025 مولّد الاختبارات التربوية</footer>
</div>

<script>
(function() {
    "use strict";

    const API_URL = '/api/generate';
    const generateBtn = document.getElementById('generateBtn');
    const statusEl = document.getElementById('status');
    const outputEl = document.getElementById('output');
    const a4Paper = document.getElementById('a4Paper');
    const actionButtonsArea = document.getElementById('actionButtonsArea');
    const btnToggleEdit = document.getElementById('btnToggleEdit');
    const fontSizeSlider = document.getElementById('fontSizeSlider');
    const fontSizeValue = document.getElementById('fontSizeValue');

    let isEditMode = false;

    // ─── إضافات نظام العزل الصارم ───
    const specializationShield = {
        "الرياضيات": "المصطلحات المسموحة: (جبر، هندسة، حساب، أشعة، دوال). يُمنع تماماً ذكر: (نصوص أدبية، شخصيات تاريخية، تجارب فيزيائية، إعراب).",
        "اللغة العربية": "المصطلحات المسموحة: (نحو، صرف، بلاغة، عروض، نقد). يُمنع تماماً ذكر: (معادلات، رموز كيميائية، خرائط، قوانين فيزياء).",
        "العلوم الفيزيائية": "المصطلحات المسموحة: (مادة، تحولات، ميكانيك، كهرباء، ضوء). يُمنع تماماً ذكر: (تحليل نص، إعراب، تاريخ الجزائر).",
        "التاريخ والجغرافيا": "المصطلحات المسموحة: (ثورة، حضارة، تضاريس، مناخ). يُمنع تماماً ذكر: (حسابات معقدة، قواعد لغة، تجارب مخبرية)."
    };

    function getField(id) {
        const el = document.getElementById(id);
        return el ? el.value.trim() : '';
    }

    function buildPayload() {
        const subject = getField('subject');
        const topic = getField('topic');
        
        const isolationPrompt = `
🔴 تنبيه أمني تربوي:
أنت الآن في "وضع التخصص المحصور". 
المادة المختارة هي: [${subject}].
قواعد العزل: ${specializationShield[subject] || 'التزم بالتخصص الدقيق للمادة فقط.'}

مهمتك:
صمم اختباراً في مادة ${subject} حصراً. حتى لو كان الموضوع المكتوب (${topic}) يوحي بمادة أخرى، يجب عليك تكييفه ليكون سؤالاً في مادة ${subject} فقط.
`;

        const instructions = `
${isolationPrompt}
🎯 صمم ${getField('examType')} رسمي للمستوى ${getField('grade')} بالجزائر.
📅 السنة: ${getField('schoolYear')} | المدة: ${getField('duration')} | العلامة: ${getField('mark')}
🔖 المحور: ${topic || 'عام'}

هيكل الورقة:
1. ترويسة رسمية في الأعلى.
2. الأسئلة مقسمة إلى تمارين ووضعية إدماجية.
3. خط فاصل <hr class="page-break"> يليه الإجابة النموذجية في صفحة جديدة.

تنسيق HTML مطلوب:
- <div class="q"> للحاوية.
- <div class="n"> للعنوان والنقاط.
- <div class="t"> للأسئلة.
- للكسور: <span class="fraction"><span class="num">...</span><span class="den">...</span></span>.
أرجع HTML خالصاً بدون وسم \`\`\`html.
`.trim();

        return { subject, prompt: instructions };
    }

    async function generateExam() {
        generateBtn.disabled = true;
        statusEl.textContent = '⏳ جاري التوليد...';
        outputEl.innerHTML = '<div style="text-align:center; padding:40px;">⏳ يرجى الانتظار...</div>';

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(buildPayload())
            });

            const data = await response.json();
            // تنظيف النتيجة من الماركدوان
            let cleanHtml = (data.result || JSON.stringify(data)).replace(/```html|```/gi, '').trim();

            outputEl.innerHTML = cleanHtml;
            actionButtonsArea.style.display = 'block';
            statusEl.textContent = '✅ تم الإنشاء';
        } catch (error) {
            statusEl.textContent = '❌ خطأ في الاتصال';
        } finally {
            generateBtn.disabled = false;
        }
    }

    window.toggleEditMode = function() {
        isEditMode = !isEditMode;
        a4Paper.classList.toggle('editable', isEditMode);
        outputEl.contentEditable = isEditMode;
        btnToggleEdit.textContent = isEditMode ? '❌ إيقاف التعديل' : '✏️ تعديل مباشر';
    };

    window.changeFontSize = function(size) {
        outputEl.style.fontSize = size + 'pt';
        fontSizeValue.textContent = size + 'pt';
    };

    window.downloadWord = function() { /* منطق التحميل كما هو */ };
    window.downloadPDF = function() { window.print(); };

    generateBtn.addEventListener('click', generateExam);

})();
</script>
</body>
</html>
