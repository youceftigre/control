<div class="container">
    
    <!-- لوحة التحكم -->
    <div class="control-panel no-print">
        <div class="dev-info">
            <div class="dev-name">⚙️ تطوير: youcef .b</div>
            <div style="font-size: 0.8rem;">youcefbenhamidaa@gmail.com</div>
        </div>

        <h2>📋 إعدادات الاختبار</h2>

        <div class="form-group">
            <label>📚 المادة *</label>
            <select id="subject">
                <option value="">اختر المادة...</option>
                <optgroup label="المواد الأساسية">
                    <option value="الرياضيات">الرياضيات</option>
                    <option value="اللغة العربية">اللغة العربية</option>
                    <option value="اللغة الفرنسية">اللغة الفرنسية</option>
                    <option value="اللغة الإنجليزية">اللغة الإنجليزية</option>
                </optgroup>
                <optgroup label="المواد العلمية">
                    <option value="العلوم الفيزيائية والتكنولوجيا">العلوم الفيزيائية والتكنولوجيا</option>
                    <option value="علوم الطبيعة والحياة">علوم الطبيعة والحياة</option>
                    <option value="الإعلام الآلي">الإعلام الآلي</option>
                </optgroup>
                <optgroup label="المواد الاجتماعية والتربوية">
                    <option value="التاريخ والجغرافيا">التاريخ والجغرافيا</option>
                    <option value="التربية الإسلامية">التربية الإسلامية</option>
                    <option value="التربية المدنية">التربية المدنية</option>
                </optgroup>
                <optgroup label="مواد الإيقاظ والفنون">                    <option value="التربية الفنية التشكيلية">التربية الفنية التشكيلية</option>

                </optgroup>
            </select>
        </div>

        <div class="form-group">
            <label>🎓 المستوى *</label>
            <select id="grade">
                <option value="">اختر المستوى...</option>
                <option value="السنة الأولى متوسط">السنة الأولى متوسط</option>
                <option value="السنة الثانية متوسط">السنة الثانية متوسط</option>
                <option value="السنة الثالثة متوسط">السنة الثالثة متوسط</option>

            </select>

            <label>🏫 المؤسسة التربوية</label>

        <button class="generate-btn" onclick="generateExam()" id="genBtn">✨ توليد ورقة الاختبار</button>
                <div id="status"></div>

            <button class="btn-action btn-word" onclick="downloadWord()">📄 Word</button>
            <button class="btn-action btn-print" onclick="window.print()">🖨️ طباعة</button>

    <!-- منطقة المعاينة -->

        <div class="a4-paper" id="paperContent">
            <div style="text-align: center; padding: 100px 20px; color: #aaa;">
                <h2>📄 مساحة العمل</h2>
                <p>قم باختيار الإعدادات ثم اضغط "توليد"</p>
            </div>
        </div>
    </div>

<script>
    function get(id) { return document.getElementById(id).value.trim(); }

    function setStatus(msg, type) {
        const el = document.getElementById('status');
        el.textContent = msg;
        el.style.display = 'block';
        el.className = type;
    }

    async function generateExam() {
        const btn = document.getElementById('genBtn');
        const paper = document.getElementById('paperContent');
        
        if (!get('subject') || !get('grade')) {
            setStatus('⚠️ يرجى اختيار المادة والمستوى', 'error');
            return;
        }

        btn.disabled = true;
        btn.innerHTML = '⏳ جاري التفكير...';
        setStatus('⏳ يتم الآن صياغة الأسئلة وفق المنهاج...', 'loading');

        const payload = {
            subject: get('subject'),
            grade: get('grade'),
            semester: get('semester'),
            school: get('school'),
            schoolYear: get('schoolYear'),
            duration: get('duration'),
            topic: get('topic'),            examType: 'اختبار فصلي'
        };

        try {
            const res = await fetch('/api/generate', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });

            const data = await res.json();

            if (data.success) {
                // تنظيف الكود من أي شوائب
                let html = data.result.replace(/```html/gi, '').replace(/```/g, '').trim();
                paper.innerHTML = html;
                document.getElementById('actionButtons').style.display = 'flex';
                setStatus('✅ تم التوليد بنجاح!', 'success');
            } else {
                setStatus('❌ خطأ: ' + (data.error || 'غير معروف'), 'error');
            }
        } catch (e) {
            setStatus('❌ خطأ في الاتصال بالخادم', 'error');
            console.error(e);
        } finally {
            btn.disabled = false;
            btn.innerHTML = '✨ توليد ورقة الاختبار';
        }
    }

    function downloadWord() {
        const content = document.getElementById('paperContent').innerHTML;
        const html = `
            <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
            <head><meta charset='utf-8'><title>اختبار</title>
            <style>body{font-family:'Traditional Arabic',Arial;direction:rtl;text-align:right;}</style>
            </head><body>${content}</body></html>`;
        
        const blob = new Blob(['\ufeff', html], { type: 'application/msword' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `اختبار_${get('subject')}_${get('grade')}.doc`;
        a.click();
    }
</script>
