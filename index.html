<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مولّد الاختبارات التربوية – المنهاج الجزائري</title>
    <style>
        /* ─── CSS Variables ─── */
        :root {
            --primary: #0b3b5c;
            --primary-light: #1e5a7d;
            --accent: #2a9d8f;
            --accent-light: #e9f2f0;
            --bg: #f5f7fa;
            --card: #ffffff;
            --text: #1e2b3c;
            --text-muted: #4a6572;
            --border: #d9e2ec;
            --shadow: 0 12px 30px rgba(0,0,0,0.08);
            --radius: 24px;
            --radius-sm: 14px;
            --a4-width: 210mm;
            --a4-padding: 20mm;
        }

        /* ─── Reset & Base ─── */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            padding: 20px;
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, 'Noto Sans Arabic', sans-serif;
            line-height: 1.6;
        }

        /* ─── Container ─── */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 28px 32px;
            position: relative;
        }

        /* ─── Header ─── */
        .developer-signature {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 0.9rem;
            color: var(--text-muted);
            border-bottom: 1px dashed #cbd5e1;
            padding-bottom: 10px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .signature-name {
            background: var(--accent-light);
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: 600;
            color: var(--primary);
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 10px;
            border-right: 6px solid var(--accent);
            padding-right: 20px;
        }
        .subtitle {
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 1rem;
        }

        /* ─── Form Grid ─── */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 18px 24px;
            background: #fafbfc;
            padding: 24px;
            border-radius: 20px;
            margin-bottom: 30px;
        }
        .field-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .field-group.full-width { grid-column: 1 / -1; }

        label {
            font-weight: 600;
            font-size: 0.9rem;
            color: #1e3a5f;
        }

        input, select, textarea {
            padding: 12px 14px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 0.95rem;
            background: white;
            transition: 0.2s;
            resize: vertical;
            color: var(--text);
        }

        /* ─── A4 Paper ─── */
        .a4-paper {
            width: var(--a4-width);
            min-height: 297mm;
            background: white;
            margin: 0 auto;
            padding: var(--a4-padding);
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            border: 1px solid #e2e8f0;
            position: relative;
        }
        .paper-content {
            font-size: 14pt;
            line-height: 1.8;
            color: #1a1a1a;
        }
        
        .strong-sep {
            border: none;
            height: 2px;
            background: #000;
            margin: 20px 0;
        }

        .page-break {
            page-break-before: always;
            border-top: 2px dashed var(--accent);
            margin: 40px 0;
            padding-top: 20px;
        }

        /* ─── Buttons ─── */
        .btn-green {
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px 28px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 48px;
            cursor: pointer;
            width: 100%;
            max-width: 300px;
        }
        .btn-green:disabled { background: #ccc; }

        /* Fraction Styling */
        .fraction {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            vertical-align: middle;
            margin: 0 4px;
        }
        .fraction .num { border-bottom: 1px solid black; padding: 0 2px; }
        .fraction .den { padding: 0 2px; }

        @media print {
            .form-grid, .btn-green, .developer-signature, .subtitle { display: none; }
            body { padding: 0; background: white; }
            .container { box-shadow: none; padding: 0; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="developer-signature">
        <span>⚙️ تطوير: <span class="signature-name">youcef.b</span></span>
        <span>📧 youcefbenhamidaa@gmail.com</span>
    </div>

    <h1>📋 مولّد الاختبارات التربوية</h1>
    <p class="subtitle">نظام ذكي لإنشاء اختبارات مطابقة للمنهاج الجزائري دون خلط المواد</p>

    <div class="form-grid">
        <div class="field-group">
            <label for="subject">📚 المادة</label>
            <select id="subject">
                <option value="الرياضيات" selected>الرياضيات</option>
                <option value="اللغة العربية">اللغة العربية</option>
                <option value="العلوم الفيزيائية">العلوم الفيزيائية</option>
                <option value="علوم الطبيعة والحياة">علوم الطبيعة والحياة</option>
                <option value="التاريخ والجغرافيا">التاريخ والجغرافيا</option>
                <option value="التربية الإسلامية">التربية الإسلامية</option>
            </select>
        </div>

        <div class="field-group">
            <label for="grade">🎓 المستوى الدراسي</label>
            <select id="grade">
                <option value="الأولى متوسط">الأولى متوسط</option>
                <option value="الثانية متوسط">الثانية متوسط</option>
                <option value="الثالثة متوسط" selected>الثالثة متوسط</option>
                <option value="الرابعة متوسط">الرابعة متوسط</option>
            </select>
        </div>

        <div class="field-group">
            <label for="examType">📝 نوع التقييم</label>
            <select id="examType">
                <option value="اختبار للفصل">اختبار</option>
                <option value="فرض">فرض</option>
            </select>
        </div>

        <div class="field-group">
            <label for="topic">🔖 الموضوع / المحور</label>
            <input type="text" id="topic" placeholder="مثال: القوى ذات أسس صحيحة">
        </div>

        <div class="field-group full-width">
            <label for="extra">📌 تعليمات إضافية</label>
            <textarea id="extra" rows="2" placeholder="أي تفاصيل أخرى تريدها في الأسئلة..."></textarea>
        </div>
    </div>

    <div style="display: flex; justify-content: center; margin-bottom: 30px;">
        <button class="btn-green" id="generateBtn">✨ توليد الاختبار الآن</button>
    </div>

    <div class="a4-paper" id="a4Paper">
        <div class="paper-content" id="output">
            <p style="text-align:center; color:#999;">سيظهر محتوى الاختبار هنا بعد الضغط على الزر...</p>
        </div>
    </div>
</div>

<script>
(function() {
    "use strict";

    const API_URL = '/api/generate';
    const generateBtn = document.getElementById('generateBtn');
    const outputEl = document.getElementById('output');

    // ─── مصفوفة العزل الصارم لضمان عدم تداخل المواد ───
    const isolationRules = {
        "الرياضيات": "المجال: حسابي، هندسي، إحصائي. يمنع ذكر أي نصوص أدبية أو تجارب مخبرية.",
        "اللغة العربية": "المجال: قواعد، بلاغة، تحليل نصوص. يمنع إدراج معادلات رياضية أو رموز كيميائية.",
        "العلوم الفيزيائية": "المجال: ظواهر كهربائية، ميكانيكية، مادة وتحولاتها. يمنع الخلط مع الإعراب أو التاريخ.",
        "التاريخ والجغرافيا": "المجال: أحداث تاريخية، خرائط، سكان. يمنع إدراج تمارين حسابية معقدة."
    };

    function buildPayload() {
        const subject = document.getElementById('subject').value;
        const grade = document.getElementById('grade').value;
        const examType = document.getElementById('examType').value;
        const topic = document.getElementById('topic').value || 'شامل للمنهاج';
        const extra = document.getElementById('extra').value;

        // البرومبت المعدل لمنع الخلط
        const instructions = `
أنت خبير تربوي جزائري. صمم ${examType} في مادة [${subject}] حصراً.

⚠️ قانون العزل الصارم:
- المادة المطلوبة هي (${subject})، لا تذكر أي معلومة تنتمي لمادة أخرى.
- اعتمد على منهاج الجيل الثاني لوزارة التربية الوطنية الجزائرية للمستوى (${grade}).
- المجال الفني للمادة: ${isolationRules[subject] || 'تخصص دقيق'}.

هيكل الاختبار المطلوب:
1. الجزء الأول (12 نقطة): تمارين قصيرة ومركزة.
2. الجزء الثاني (08 نقاط): وضعية إدماجية مركبة من واقع التلميذ الجزائري.
3. الإجابة النموذجية: في صفحة منفصلة تبدأ بـ <hr class="page-break">.

تنسيق HTML المطلوب:
- استخدم <div class="q"> لكل سؤال.
- استخدم <div class="n"> لعنوان السؤال والنقاط.
- استخدم <div class="t"> لمحتوى السؤال.
- للكسور الرياضية استخدم: <span class="fraction"><span class="num">بسط</span><span class="den">مقام</span></span>.
- أرجع الكود كـ HTML خالص بدون وسم \`\`\`html.
`.trim();

        return {
            subject, grade, topic,
            prompt: instructions
        };
    }

    async function generateExam() {
        generateBtn.disabled = true;
        outputEl.innerHTML = '<div style="text-align:center; padding:50px;">⏳ جاري المعالجة وبناء الاختبار بدقة...</div>';

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(buildPayload())
            });

            const data = await response.json();
            let htmlResult = data.result || data.choices[0].message.content; // حسب استجابة السيرفر الخاص بك

            // تنظيف المحتوى من وسوم الماركدوان إذا وجدت
            htmlResult = htmlResult.replace(/```html/gi, '').replace(/```/g, '').trim();

            outputEl.innerHTML = htmlResult;

        } catch (error) {
            outputEl.innerHTML = `<div style="color:red;">❌ حدث خطأ في الاتصال: ${error.message}</div>`;
        } finally {
            generateBtn.disabled = false;
        }
    }

    generateBtn.addEventListener('click', generateExam);
})();
</script>

</body>
</html>
