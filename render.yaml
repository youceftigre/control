services:
  - type: web
    name: exam-platform-algeria
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: "0"
      - key: DATABASE_URL
        value: sqlite:////data/exams.db
    autoDeploy: true
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
    healthCheckPath: /health
